<VirtualHost *:80>
    ServerAdmin webmaster@shaleh-alsarat.local
    DocumentRoot /var/www/html/public

    <Directory /var/www/html/public>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
        DirectoryIndex index.php

        # Modern Laravel routing: send unmatched requests to /index.php
        RewriteEngine On
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteCond %{REQUEST_FILENAME} !-d
        RewriteRule ^ index.php [L]

        # Cache static assets aggressively (vite output has content-hashed filenames)
        <FilesMatch "\.(css|js|jpg|jpeg|png|gif|ico|svg|woff2?|ttf|eot)$">
            Header set Cache-Control "public, max-age=31536000, immutable"
        </FilesMatch>

        # Disable caching for the entry point so Laravel can serve fresh HTML
        <FilesMatch "\.(html|php)$">
            Header set Cache-Control "no-cache, no-store, must-revalidate"
        </FilesMatch>

        # Security headers
        Header always set X-Content-Type-Options "nosniff"
        Header always set X-Frame-Options "SAMEORIGIN"
        Header always set Referrer-Policy "strict-origin-when-cross-origin"
        Header always set Permissions-Policy "geolocation=(), microphone=(), camera=()"
    </Directory>

    # PHP-FPM via mod_php (since php:8.2-apache image)
    <FilesMatch \.php$>
        SetHandler application/x-httpd-php
    </FilesMatch>

    ErrorLog /proc/self/fd/2
    CustomLog /proc/self/fd/1 combined

    # Hide Apache version + reduce server fingerprinting
    ServerTokens Prod
    TraceEnable Off
</VirtualHost>
