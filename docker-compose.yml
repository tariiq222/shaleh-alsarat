# ===========================================================
# shaleh-alsarat — Production Docker Compose
# ===========================================================
# Uses an EXTERNAL PostgreSQL database (managed elsewhere).
# Only the Laravel app runs in Docker.
#
# Usage:
#   1. Copy .env.production.example -> .env and fill in
#   2. docker compose up -d --build
#   3. docker compose logs -f app
# ===========================================================
#
# Compatible with Coolify / Portainer / standard docker compose.
# Project name suggestion in Coolify: "al-shalehat"
# ===========================================================

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: shaleh-alsarat:latest
    container_name: shaleh-app
    restart: unless-stopped

    # Map container port 80 → host port 80 (adjust behind a reverse proxy if needed)
    ports:
      - "80:80"

    environment:
      APP_NAME: "شاليهات السراة"
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: ${APP_URL:-http://localhost}

      LOG_CHANNEL: stack
      LOG_STACK: single
      LOG_LEVEL: info

      # ---- Database (external PostgreSQL) ----
      # Option A: Use a single DATABASE_URL (Laravel parses it automatically)
      DB_CONNECTION: pgsql
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL required}

      # Option B: Uncomment + use individual fields instead of DATABASE_URL
      # DB_HOST: ${DB_HOST}
      # DB_PORT: ${DB_PORT:-5432}
      # DB_DATABASE: ${DB_DATABASE}
      # DB_USERNAME: ${DB_USERNAME}
      # DB_PASSWORD: ${DB_PASSWORD}
      # DB_SSLMODE: require

      CACHE_STORE: database
      SESSION_DRIVER: database
      QUEUE_CONNECTION: database
      FILESYSTEM_DISK: public

      ADMIN_NAME: ${ADMIN_NAME:-مدير الشاليه}
      ADMIN_EMAIL: ${ADMIN_EMAIL:?ADMIN_EMAIL required}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?ADMIN_PASSWORD required}

    volumes:
      # Persistent storage for uploaded photos + logs (survives container recreate).
      # On first run, the image's pre-baked photos (28 PNGs ~55MB) are used.
      # Any new uploads in production go into this Docker named volume.
      - chalet-storage:/var/www/html/storage

    networks:
      - chalet-net

    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost/up || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  chalet-storage:
    name: shaleh-alsarat-storage

networks:
  chalet-net:
    name: chalet-net
    driver: bridge
